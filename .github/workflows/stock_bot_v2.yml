name: Send Stock Price to Dot Device (FAST)

on:
  schedule:
    - cron: '13 0-6 * * 1-5'
    - cron: '43 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and Send
        env:
          QUOTE_API_KEY: ${{ secrets.QUOTE_API_KEY }}
          QUOTE_DEVICE_ID: ${{ secrets.QUOTE_DEVICE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import datetime
          import pytz

          CONFIG_FILE = "stocks.txt"

          def load_config():
              stocks = []
              with open(CONFIG_FILE, "r", encoding="utf-8") as f:
                  for line in f:
                      if line.strip() and not line.startswith("#"):
                          code, name, limit, shares = line.split(",")
                          stocks.append({
                              "code": code.strip(),
                              "name": name.strip(),
                              "limit": float(limit),
                              "shares": int(shares)
                          })
              return stocks

          # -----------------------------
          # Stooq API（最速）
          # -----------------------------
          def get_price(code):
              symbol = f"{code.lower()}.jp"
              url = f"https://stooq.com/q/l/?s={symbol}&f=sd2t2ohlcv&h&e=csv"

              r = requests.get(url, timeout=10)
              lines = r.text.strip().split("\n")

              if len(lines) < 2:
                  return None

              close = lines[1].split(",")[6]
              return float(close)

          def send(title, msg, device_id, api_key):
              url = f"https://dot.mindreset.tech/api/authV2/open/device/{device_id}/text"
              payload = {
                  "refreshNow": True,
                  "title": title,
                  "message": msg
              }
              headers = {
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              }
              requests.post(url, headers=headers, json=payload)

          def main():
              stocks = load_config()

              jst = pytz.timezone("Asia/Tokyo")
              now = datetime.datetime.now(jst).strftime("%H:%M")

              lines = []

              for s in stocks:
                  price = get_price(s["code"])

                  if price is None:
                      continue

                  diff = (price - s["limit"]) * s["shares"]
                  sign = "+" if diff > 0 else "-"
                  lines.append(f"{sign}{int(abs(diff)/10000)}万円 {s['name']}")

              message = "\n".join(lines[:5])

              title = f"{now}"

              print("\n--- [送信データ内容ログ] ───")
              print("■ タイトル:")
              print(title)
              print("■ メッセージ本文:")
              print(message)
              print("────────────────────────────\n")

              send(title, message,
                   os.environ["QUOTE_DEVICE_ID"],
                   os.environ["QUOTE_API_KEY"])

          main()
          EOF
