name: Send Stock Price to Dot Device (PRO FINAL)

on:
  schedule:
    - cron: '13 0-5,22-23 * * 1-5'
    - cron: '27 0-5,22-23 * * 1-5'
    - cron: '43 0-5,22-23 * * 1-5'
    - cron: '57 0-5,22-23 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      # 念のため stocks.txt が存在するか確認するステップを追加
      - name: Check config file
        run: |
          if [ -f "stocks.txt" ]; then
            echo "✅ stocks.txt が見つかりました。"
          else
            echo "❌ エラー: stocks.txt がリポジトリのルートに見つかりません！"
            exit 1
          fi

      - name: Run Stock Script
        env:
          QUOTE_API_KEY: ${{ secrets.QUOTE_API_KEY }}
          QUOTE_DEVICE_ID: ${{ secrets.QUOTE_DEVICE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import datetime
          import pytz
          import math
          import sys

          CONFIG_FILE = "stocks.txt"

          # -----------------------------
          # 設定読み込み
          # -----------------------------
          def load_config():
              print("ログ: stocks.txt の読み込みを開始します...")
              stocks = []
              try:
                  with open(CONFIG_FILE, "r", encoding="utf-8") as f:
                      for i, line in enumerate(f, 1):
                          if not line.strip() or line.startswith("#"):
                              continue
                          parts = line.split(",")
                          if len(parts) < 4:
                              print(f"⚠️ 警告: stocks.txt の {i} 行目のフォーマットが不正です。スキップします。")
                              continue
                          code, name, limit, shares = parts[0:4]
                          stocks.append({
                              "code": code.strip(),
                              "name": name.strip(),
                              "limit": float(limit),
                              "shares": int(shares)
                          })
                  print(f"ログ: {len(stocks)} 件の銘柄を読み込みました。")
                  return stocks
              except Exception as e:
                  print(f"❌ エラー: stocks.txt の読み込み中に問題が発生しました: {e}")
                  sys.exit(1)

          # -----------------------------
          # 株価取得
          # -----------------------------
          def get_price(symbol):
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}"
                  headers = {"User-Agent": "Mozilla/5.0"}
                  r = requests.get(url, headers=headers, timeout=10)
                  
                  if r.status_code != 200:
                      print(f"⚠️ Yahoo Finance APIエラー ({symbol}): ステータスコード {r.status_code}")
                      return None
                      
                  data = r.json()
                  result = data.get("chart", {}).get("result")
                  if not result:
                      return None
                  return result[0]["meta"].get("regularMarketPrice")
              except Exception as e:
                  print(f"⚠️ 株価取得中にエラー ({symbol}): {e}")
                  return None

          # -----------------------------
          # 日経平均（前日比）
          # -----------------------------
          def get_nikkei_change():
              try:
                  url = "https://query1.finance.yahoo.com/v8/finance/chart/^N225"
                  headers = {"User-Agent": "Mozilla/5.0"}
                  r = requests.get(url, headers=headers, timeout=10)
                  data = r.json()
                  result = data.get("chart", {}).get("result")
                  if not result:
                      return None
                  meta = result[0].get("meta", {})
                  current = meta.get("regularMarketPrice")
                  prev = meta.get("chartPreviousClose")
                  if current is None or prev is None:
                      return None
                  diff = current - prev
                  sign = "+" if diff >= 0 else ""
                  return f"日経平均:{sign}{int(diff):,}円"
              except Exception as e:
                  print(f"⚠️ 日経平均取得中にエラー: {e}")
                  return None

          # -----------------------------
          # 送信
          # -----------------------------
          def send(title, message):
              device_id = os.environ.get('QUOTE_DEVICE_ID')
              api_key = os.environ.get('QUOTE_API_KEY')
              
              if not device_id or not api_key:
                  print("❌ エラー: GitHub Secrets (QUOTE_API_KEY または QUOTE_DEVICE_KEY) が設定されていないか、環境変数が空です。")
                  return

              url = f"https://dot.mindreset.tech/api/authV2/open/device/{device_id}/text"

              print("\n--- [送信データ内容ログ] ───")
              print("■ タイトル:")
              print(title)
              print("■ メッセージ本文:")
              print(message)
              print("────────────────────────────\n")

              payload = {
                  "refreshNow": True,
                  "title": title,
                  "message": message,
                  "styles": {
                      "title": {"fontSize": 20, "fontFamily": "ChillDuanSans"},
                      "message": {"fontFamily": "ChillDuanSans"}
                  }
              }
              headers = {
                  "Authorization": f"Bearer {api_key}",
                  "Content-Type": "application/json"
              }
              try:
                  res = requests.post(url, headers=headers, json=payload, timeout=10)
                  print(f"ログ: API送信ステータスコード: {res.status_code}")
                  print(f"ログ: APIレスポンス: {res.text}")
              except Exception as e:
                  print(f"❌ API送信中に通信エラーが発生しました: {e}")

          # -----------------------------
          # メイン
          # -----------------------------
          def main():
              print("ログ: スクリプトを開始しました。")
              jst = pytz.timezone("Asia/Tokyo")
              now_jst = datetime.datetime.now(jst)
              print(f"ログ: 現在の日本時間: {now_jst.strftime('%Y-%m-%d %H:%M:%S')}")

              if now_jst.weekday() >= 5:
                  print(f"本日は週末 ({now_jst.strftime('%A')}) のため、実行をスキップします。")
                  return

              if now_jst.hour < 9 or now_jst.hour >= 17:
                  print(f"現在は市場外の時間帯 ({now_jst.strftime('%H:%M')}) です。実行をスキップします。")
                  return

              stocks = load_config()
              if not stocks:
                  print("⚠️ 処理する銘柄がありません。終了します。")
                  return

              now = now_jst.strftime("%H:%M")
              nikkei = get_nikkei_change()
              nikkei_text = nikkei if nikkei else ""

              results = []
              for s in stocks:
                  price = get_price(f"{s['code']}.T")
                  if price is None:
                      print(f"⚠️ {s['name']} ({s['code']}) の株価が取得できませんでした。")
                      continue

                  diff = (price - s["limit"]) * s["shares"]
                  pct = ((price - s["limit"]) / s["limit"]) * 100 if s["limit"] > 0 else 0.0

                  if abs(diff) < 50:
                      diff = 0
                      pct = 0.0

                  results.append({"name": s["name"], "diff": diff, "pct": pct})

              results.sort(key=lambda x: x["diff"], reverse=True)
              lines = []
              for r in results:
                  sign = "+" if r["diff"] > 0 else "-" if r["diff"] < 0 else " "
                  value = int(abs(r["diff"]) / 10000)
                  pct_val = math.trunc(r["pct"])
                  lines.append(f"{sign}{value:2d}万円({pct_val:3d}%) {r['name']}")

              if not lines:
                  lines = ["データ取得失敗"]

              message = "\n".join(lines[:5])
              send(f"{now} {nikkei_text}".strip(), message)

          main()
          EOF
