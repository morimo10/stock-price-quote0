name: Send Stock Price to Dot Device (PRO FINAL)

on:
  schedule:
    - cron: '13 0-6 * * 1-5'
    - cron: '43 0-6 * * 1-5'
    - cron: '57 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04

    steps
      - uses: actions/checkout@v4

      - name: Run Stock Script
        env:
          QUOTE_API_KEY: ${{ secrets.QUOTE_API_KEY }}
          QUOTE_DEVICE_ID: ${{ secrets.QUOTE_DEVICE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import datetime
          import pytz

          CONFIG_FILE = "stocks.txt"

          # -----------------------------
          # 設定読み込み
          # -----------------------------
          def load_config():
              stocks = []
              with open(CONFIG_FILE, "r", encoding="utf-8") as f:
                  for line in f:
                      if not line.strip() or line.startswith("#"):
                          continue
                      code, name, limit, shares = line.split(",")
                      stocks.append({
                          "code": code.strip(),
                          "name": name.strip(),
                          "limit": float(limit),
                          "shares": int(shares)
                      })
              return stocks

          # -----------------------------
          # 株価取得（安全版）
          # -----------------------------
          def get_price(symbol):
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}"
                  headers = {"User-Agent": "Mozilla/5.0"}

                  r = requests.get(url, headers=headers, timeout=10)
                  data = r.json()

                  result = data.get("chart", {}).get("result")
                  if not result:
                      return None

                  return result[0]["meta"].get("regularMarketPrice")

              except:
                  return None

          # -----------------------------
          # 日経平均（前日比）
          # -----------------------------
          def get_nikkei_change():
              try:
                  url = "https://query1.finance.yahoo.com/v8/finance/chart/^N225"
                  headers = {"User-Agent": "Mozilla/5.0"}

                  r = requests.get(url, headers=headers, timeout=10)
                  data = r.json()

                  result = data.get("chart", {}).get("result")
                  if not result:
                      return None

                  meta = result[0].get("meta", {})

                  current = meta.get("regularMarketPrice")
                  prev = meta.get("chartPreviousClose")

                  if current is None or prev is None:
                      return None

                  diff = current - prev
                  sign = "+" if diff >= 0 else ""

                  return f"日経:{sign}{int(diff):,}円"

              except:
                  return None

          # -----------------------------
          # 送信
          # -----------------------------
          def send(title, message):
              url = f"https://dot.mindreset.tech/api/authV2/open/device/{os.environ['QUOTE_DEVICE_ID']}/text"

              print("\n--- [送信データ内容ログ] ───")
              print("■ タイトル:")
              print(title)
              print("■ メッセージ本文:")
              print(message)
              print("────────────────────────────\n")

              payload = {
                  "refreshNow": True,
                  "title": title,
                  "message": message
              }

              headers = {
                  "Authorization": f"Bearer {os.environ['QUOTE_API_KEY']}",
                  "Content-Type": "application/json"
              }

              requests.post(url, headers=headers, json=payload)

          # -----------------------------
          # メイン
          # -----------------------------
          def main():
              stocks = load_config()

              jst = pytz.timezone("Asia/Tokyo")
              now = datetime.datetime.now(jst).strftime("%H:%M")

              # 日経
              nikkei = get_nikkei_change()
              nikkei_text = nikkei if nikkei else ""

              results = []

              for s in stocks:
                  price = get_price(f"{s['code']}.T")

                  if price is None:
                      continue

                  diff = (price - s["limit"]) * s["shares"]

                  # -0対策（完全）
                  if abs(diff) < 50:
                      diff = 0

                  results.append({
                      "name": s["name"],
                      "diff": diff
                  })

              # 数値ソート
              results.sort(key=lambda x: x["diff"], reverse=True)

              lines = []

              for r in results:
                  sign = "+" if r["diff"] > 0 else "-" if r["diff"] < 0 else " "
                  value = int(abs(r["diff"]) / 10000)

                  lines.append(f"{sign}{value}万円 {r['name']}")

              if not lines:
                  lines = ["データ取得失敗"]

              message = "\n".join(lines[:5])

              send(f"{now} {nikkei_text}".strip(), message)

          main()
          EOF
