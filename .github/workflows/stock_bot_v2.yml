name: Send Stock Price to Dot Device (PRO FINAL)

on:
  schedule:
    - cron: '13 0-5,22-23 * * 1-5'
    - cron: '27 0-5,22-23 * * 1-5'
    - cron: '43 0-5,22-23 * * 1-5'
    - cron: '57 0-5,22-23 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Run Stock Script
        env:
          QUOTE_API_KEY: ${{ secrets.QUOTE_API_KEY }}
          QUOTE_DEVICE_ID: ${{ secrets.QUOTE_DEVICE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import datetime
          import pytz
          import math

          CONFIG_FILE = "stocks.txt"

          # -----------------------------
          # 設定読み込み
          # -----------------------------
          def load_config():
              stocks = []
              with open(CONFIG_FILE, "r", encoding="utf-8") as f:
                  for line in f:
                      if not line.strip() or line.startswith("#"):
                          continue
                      code, name, limit, shares = line.split(",")
                      stocks.append({
                          "code": code.strip(),
                          "name": name.strip(),
                          "limit": float(limit),
                          "shares": int(shares)
                      })
              return stocks

          # -----------------------------
          # 株価取得（安全版）
          # -----------------------------
          def get_price(symbol):
              try:
                  url = f"https://query1.finance.yahoo.com/v8/finance/chart/{symbol}"
                  headers = {"User-Agent": "Mozilla/5.0"}

                  r = requests.get(url, headers=headers, timeout=10)
                  data = r.json()

                  result = data.get("chart", {}).get("result")
                  if not result:
                      return None

                  return result[0]["meta"].get("regularMarketPrice")

              except:
                  return None

          # -----------------------------
          # 日経平均（前日比）
          # -----------------------------
          def get_nikkei_change():
              try:
                  url = "https://query1.finance.yahoo.com/v8/finance/chart/^N225"
                  headers = {"User-Agent": "Mozilla/5.0"}

                  r = requests.get(url, headers=headers, timeout=10)
                  data = r.json()

                  result = data.get("chart", {}).get("result")
                  if not result:
                      return None

                  meta = result[0].get("meta", {})

                  current = meta.get("regularMarketPrice")
                  prev = meta.get("chartPreviousClose")

                  if current is None or prev is None:
                      return None

                  diff = current - prev
                  sign = "+" if diff >= 0 else ""

                  return f"日経平均:{sign}{int(diff):,}円"

              except:
                  return None

          # -----------------------------
          # 送信
          # -----------------------------
          def send(title, message):
              url = f"https://dot.mindreset.tech/api/authV2/open/device/{os.environ['QUOTE_DEVICE_ID']}/text"

              print("\n--- [送信データ内容ログ] ───")
              print("■ タイトル:")
              print(title)
              print("■ メッセージ本文:")
              print(message)
              print("────────────────────────────\n")

              # stylesの中に title と message のフォントファミリー（ChillRoundGothic）を指定
              payload = {
                  "refreshNow": True,
                  "title": title,
                  "message": message,
                  "styles": {
                      "title": {
                          "fontSize": 20,
                          "fontFamily": "ChillDuanSans"
                      },
                      "message": {
                          "fontFamily": "ChillDuanSans"
                      }
                  }
              }

              headers = {
                  "Authorization": f"Bearer {os.environ['QUOTE_API_KEY']}",
                  "Content-Type": "application/json"
              }

              requests.post(url, headers=headers, json=payload)

          # -----------------------------
          # メイン
          # -----------------------------
          def main():
             # 現在の日本時間を取得
              jst = pytz.timezone("Asia/Tokyo")
              now_jst = datetime.datetime.now(jst)

              # 9時以前 または 17時以降なら実行しない
              # （9:00〜16:59 の間だけ動かす設定）
              if now_jst.hour < 9 or now_jst.hour >= 17:
                  print(f"現在は市場外の時間帯 ({now_jst.strftime('%H:%M')}) です。実行をスキップします。")
                  return

              stocks = load_config()
              now = now_jst.strftime("%H:%M")

              # 日経
              nikkei = get_nikkei_change()
              nikkei_text = nikkei if nikkei else ""

              results = []

              for s in stocks:
                  price = get_price(f"{s['code']}.T")

                  if price is None:
                      continue

                  diff = (price - s["limit"]) * s["shares"]
                  
                  # 増加率の計算 (ゼロ除算対策含む)
                  if s["limit"] > 0:
                      pct = ((price - s["limit"]) / s["limit"]) * 100
                  else:
                      pct = 0.0

                  # -0対策（完全）
                  if abs(diff) < 50:
                      diff = 0
                      pct = 0.0

                  results.append({
                      "name": s["name"],
                      "diff": diff,
                      "pct": pct
                  })

              # 数値ソート
              results.sort(key=lambda x: x["diff"], reverse=True)

              lines = []

              for r in results:
                  # 符号の判定（プラス、マイナス、0の時は半角スペース）
                  sign = "+" if r["diff"] > 0 else "-" if r["diff"] < 0 else " "
                  value = int(abs(r["diff"]) / 10000)
                  
                  # 整数に切り捨て (正負に対応するため math.trunc を使用)
                  pct_val = math.trunc(r["pct"])

                  # 増減額の横に、3桁右詰めのパーセンテージを括弧付きで追加
                  lines.append(f"{sign}{value:2d}万円({pct_val:3d}%) {r['name']}")

              if not lines:
                  lines = ["データ取得失敗"]

              message = "\n".join(lines[:5])

              send(f"{now} {nikkei_text}".strip(), message)

          main()
          EOF
