name: Send Stock Price to Dot Device

on:
  schedule:
    # 平日 09:00〜15:59（JST）相当
    - cron: '13 0-6 * * 1-5'
    - cron: '43 0-6 * * 1-5'
  workflow_dispatch:

concurrency:
  group: weekday-daytime-job
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-stock-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python (cached)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install requests pytz yfinance

      - name: Fetch and Send Stock Data
        env:
          QUOTE_API_KEY: ${{ secrets.QUOTE_API_KEY }}
          QUOTE_DEVICE_ID: ${{ secrets.QUOTE_DEVICE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import math
          import datetime
          import pytz
          import requests
          import unicodedata
          import yfinance as yf

          CONFIG_FILE = "stocks.txt"
          DOT_API_KEY = os.environ.get("QUOTE_API_KEY")
          DOT_DEVICE_ID = os.environ.get("QUOTE_DEVICE_ID")

          # -----------------------------
          # 設定読み込み
          # -----------------------------
          def load_stocks_config(filepath):
              config = {}
              with open(filepath, "r", encoding="utf-8") as f:
                  for line in f:
                      line = line.strip()
                      if not line or line.startswith("#"):
                          continue

                      code, name, limit, shares = line.split(",")
                      ticker = code if code.endswith(".T") else f"{code}.T"

                      config[ticker] = {
                          "name": name.strip(),
                          "limit": float(limit),
                          "shares": int(shares)
                      }
              return config

          # -----------------------------
          # 文字幅調整
          # -----------------------------
          def get_display_width(text):
              return sum(2 if unicodedata.east_asian_width(c) in "FWA" else 1 for c in text)

          def pad_text(text, width):
              return text + " " * max(0, width - get_display_width(text))

          # -----------------------------
          # 株価取得（高速化版：一括）
          # -----------------------------
          def get_stock_prices(stocks_config):
              tickers = list(stocks_config.keys()) + ["^N225"]

              data = yf.download(
                  tickers=tickers,
                  period="2d",
                  threads=True,
                  group_by="ticker",
                  progress=False
              )

              results = []

              for ticker, cfg in stocks_config.items():
                  try:
                      df = data[ticker]
                      latest = df["Close"].iloc[-1]

                      diff = latest - cfg["limit"]
                      total = diff * cfg["shares"]
                      diff_wan = math.floor(total / 10000)

                      pct = (diff / cfg["limit"]) * 100 if cfg["limit"] else 0
                      pct = math.floor(pct) if pct >= 0 else math.ceil(pct)

                      results.append({
                          "name": cfg["name"],
                          "shares": cfg["shares"],
                          "diff_wan": diff_wan,
                          "pct": pct
                      })

                  except Exception:
                      results.append({
                          "name": cfg["name"],
                          "shares": cfg["shares"],
                          "diff_wan": 0,
                          "pct": -999
                      })

              results.sort(key=lambda x: x["pct"], reverse=True)
              results = results[:5]

              lines = []
              for r in results:
                  sign = "+" if r["diff_wan"] > 0 else "-" if r["diff_wan"] < 0 else " "
                  line = f" {sign}{abs(r['diff_wan']):>3}万円 ({r['shares']:>4}) {r['name']}"
                  lines.append(pad_text(line, 37))

              # 日経平均
              nikkei = data["^N225"]["Close"]
              diff = nikkei.iloc[-1] - nikkei.iloc[-2]
              sign = "+" if diff >= 0 else ""
              nikkei_info = f" 日経平均:{sign}{diff:,.0f}円"

              return "\n".join(lines), nikkei_info

          # -----------------------------
          # Dot送信（ログ付き）
          # -----------------------------
          def send_to_dot(title, message):
              url = f"https://dot.mindreset.tech/api/authV2/open/device/{DOT_DEVICE_ID}/text"

              # ★ 送信ログ（追加済み）
              print("\n--- [送信データ内容ログ] ───")
              print("■ タイトル:")
              print(title)
              print("■ メッセージ本文:")
              print(message)
              print("────────────────────────────\n")

              payload = {
                  "refreshNow": True,
                  "title": title,
                  "message": message
              }

              headers = {
                  "Authorization": f"Bearer {DOT_API_KEY}",
                  "Content-Type": "application/json"
              }

              res = requests.post(url, headers=headers, json=payload)

              if res.status_code in (200, 201):
                  print("送信結果: 成功")
              else:
                  print("送信結果: 失敗", res.status_code, res.text)

          # -----------------------------
          # メイン
          # -----------------------------
          def main():
              stocks = load_stocks_config(CONFIG_FILE)

              jst = pytz.timezone("Asia/Tokyo")
              now = datetime.datetime.now(jst).strftime("%H:%M")

              message, nikkei = get_stock_prices(stocks)

              send_to_dot(f"{now}{nikkei}", message)

          if __name__ == "__main__":
              main()
          EOF
