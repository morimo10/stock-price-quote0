name: Send Stock Price to Dot Device (FAST STABLE)

on:
  schedule:
    - cron: '13 0-6 * * 1-5'
    - cron: '43 0-6 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and Send
        env:
          QUOTE_API_KEY: ${{ secrets.QUOTE_API_KEY }}
          QUOTE_DEVICE_ID: ${{ secrets.QUOTE_DEVICE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import requests
          import datetime
          import pytz

          CONFIG_FILE = "stocks.txt"

          # -----------------------------
          # 設定読み込み
          # -----------------------------
          def load_config():
              stocks = []
              try:
                  with open(CONFIG_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          line = line.strip()
                          if not line or line.startswith("#"):
                              continue
                          code, name, limit, shares = line.split(",")
                          stocks.append({
                              "code": code.strip(),
                              "name": name.strip(),
                              "limit": float(limit),
                              "shares": int(shares)
                          })
              except Exception as e:
                  print("stocks load error:", e)
              return stocks

          # -----------------------------
          # Stooq取得（超安定版）
          # -----------------------------
          def get_price(code):
              try:
                  symbol = f"{code.lower()}.jp"
                  url = f"https://stooq.com/q/l/?s={symbol}&f=sd2t2ohlcv&h&e=csv"

                  r = requests.get(url, timeout=10)
                  text = r.text.strip().split("\n")

                  if len(text) < 2:
                      return None

                  cols = text[1].split(",")

                  if len(cols) < 7:
                      return None

                  close = cols[6]

                  if close in ("", "N/A"):
                      return None

                  return float(close)

              except Exception as e:
                  print("price error:", code, e)
                  return None

          # -----------------------------
          # 送信
          # -----------------------------
          def send(title, message):
              url = f"https://dot.mindreset.tech/api/authV2/open/device/{os.environ['QUOTE_DEVICE_ID']}/text"

              print("\n--- [送信データ内容ログ] ───")
              print("■ タイトル:")
              print(title)
              print("■ メッセージ本文:")
              print(message)
              print("────────────────────────────\n")

              payload = {
                  "refreshNow": True,
                  "title": title,
                  "message": message
              }

              headers = {
                  "Authorization": f"Bearer {os.environ['QUOTE_API_KEY']}",
                  "Content-Type": "application/json"
              }

              requests.post(url, headers=headers, json=payload)

          # -----------------------------
          # メイン処理
          # -----------------------------
          def main():
              stocks = load_config()

              if not stocks:
                  print("no stocks loaded")
                  return

              jst = pytz.timezone("Asia/Tokyo")
              now = datetime.datetime.now(jst).strftime("%H:%M")

              lines = []

              for s in stocks:
                  price = get_price(s["code"])

                  if price is None:
                      continue

                  diff = (price - s["limit"]) * s["shares"]

                  sign = "+" if diff > 0 else "-" if diff < 0 else " "

                  lines.append(f"{sign}{int(abs(diff)/10000)}万円 {s['name']}")

              # ★重要：空対策
              if not lines:
                  lines = ["データ取得失敗"]

              message = "\n".join(lines[:5])

              title = now

              send(title, message)

          main()
          EOF
