name: Send Stock Price to Dot Device

on:
  schedule:
    # 平日の日本時間 09:00〜15:59（UTC 0:00〜06:59）
    - cron: '13 0-6 * * 1-5'
    - cron: '43 0-6 * * 1-5'
  workflow_dispatch:

concurrency:
  group: weekday-daytime-job
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-stock-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python (with pip cache)
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Fetch and Send Stock Data
        env:
          QUOTE_API_KEY: ${{ secrets.QUOTE_API_KEY }}
          QUOTE_DEVICE_ID: ${{ secrets.QUOTE_DEVICE_KEY }}
        run: |
          python - << 'EOF'
          import os
          import math
          import datetime
          import pytz
          import requests
          import unicodedata
          import yfinance as yf

          CONFIG_FILE = "stocks.txt"
          DOT_API_KEY = os.environ.get("QUOTE_API_KEY")
          DOT_DEVICE_ID = os.environ.get("QUOTE_DEVICE_ID")

          # -----------------------------
          # 設定ファイル読み込み
          # -----------------------------
          def load_stocks_config(filepath):
              config = {}
              if not os.path.exists(filepath):
                  print(f"エラー: {filepath} が見つかりません")
                  return config

              with open(filepath, "r", encoding="utf-8") as f:
                  for line in f:
                      line = line.strip()
                      if not line or line.startswith("#"):
                          continue

                      code, name, limit, shares = line.split(",")
                      ticker = code if code.endswith(".T") else f"{code}.T"
                      config[ticker] = {
                          "name": name.strip(),
                          "limit": float(limit),
                          "shares": int(shares)
                      }
              return config

          # -----------------------------
          # 全角幅考慮
          # -----------------------------
          def get_display_width(text):
              width = 0
              for c in text:
                  width += 2 if unicodedata.east_asian_width(c) in "FWA" else 1
              return width

          def pad_text(text, target_width):
              return text + " " * max(0, target_width - get_display_width(text))

          # -----------------------------
          # 株価＋日経平均を一括取得（高速化）
          # -----------------------------
          def get_stock_prices(stocks_config):
              tickers = list(stocks_config.keys()) + ["^N225"]

              data = yf.download(
                  tickers=tickers,
                  period="2d",
                  threads=True,
                  group_by="ticker",
                  progress=False
              )

              stocks_data = []

              for ticker, cfg in stocks_config.items():
                  try:
                      df = data[ticker]
                      latest = df["Close"].iloc[-1]
                      diff = latest - cfg["limit"]
                      total = diff * cfg["shares"]
                      diff_wan = math.floor(total / 10000)

                      pct = (diff / cfg["limit"]) * 100 if cfg["limit"] > 0 else 0
                      pct = math.floor(pct) if pct >= 0 else math.ceil(pct)

                      stocks_data.append({
                          "name": cfg["name"],
                          "shares": cfg["shares"],
                          "diff_wan": diff_wan,
                          "pct": pct
                      })
                  except Exception:
                      stocks_data.append({
                          "name": cfg["name"],
                          "shares": cfg["shares"],
                          "diff_wan": 0,
                          "pct": -999
                      })

              stocks_data.sort(key=lambda x: x["pct"], reverse=True)
              stocks_data = stocks_data[:5]

              lines = []
              for s in stocks_data:
                  sign = "+" if s["diff_wan"] > 0 else "-" if s["diff_wan"] < 0 else " "
                  diff = f"{sign}{abs(s['diff_wan']):>3}万円"
                  line = f" {diff} ({s['shares']:>4}) {s['name']}"
                  lines.append(pad_text(line, 37))

              # 日経平均差分
              nikkei = data["^N225"]["Close"]
              nikkei_diff = nikkei.iloc[-1] - nikkei.iloc[-2]
              nikkei_sign = "+" if nikkei_diff >= 0 else ""
              nikkei_info = f" 日経平均:{nikkei_sign}{nikkei_diff:,.0f}円"

              return "\n".join(lines), nikkei_info

          # -----------------------------
          # Dot デバイス送信
          # -----------------------------
          def send_to_dot(title, message):
              url = f"https://dot.mindreset.tech/api/authV2/open/device/{DOT_DEVICE_ID}/text"
              payload = {
                  "refreshNow": True,
                  "title": title,
                  "message": message
              }
              headers = {
                  "Authorization": f"Bearer {DOT_API_KEY}",
                  "Content-Type": "application/json"
              }
              r = requests.post(url, headers=headers, json=payload)
              print("送信結果:", r.status_code)

          def main():
              stocks = load_stocks_config(CONFIG_FILE)
              if not stocks:
                  return

              jst = pytz.timezone("Asia/Tokyo")
              now = datetime.datetime.now(jst).strftime("%H:%M")

              message, nikkei = get_stock_prices(stocks)
              send_to_dot(f"{now}{nikkei}", message)

          if __name__ == "__main__":
              main()
          EOF
