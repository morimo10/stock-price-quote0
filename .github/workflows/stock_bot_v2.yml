name: Send Stock Price to Dot Device

on:
  schedule:
    - cron: '17 0-6 * * 1-5'
    - cron: '37 0-6 * * 1-5'
    - cron: '47 0-6 * * 1-5'
    - cron: '53 0-6 * * 1-5'
  workflow_dispatch:

concurrency:
  group: weekday-daytime-job
  cancel-in-progress: false

# お天気コードと同じ安全な位置にパーミッションを設定！
permissions:
  contents: write

jobs:
  run-stock-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz yfinance

      - name: Fetch and Send Stock Data
        env:
          QUOTE_API_KEY: ${{ secrets.QUOTE_API_KEY }}
          QUOTE_DEVICE_ID: ${{ secrets.QUOTE_DEVICE_KEY }}
        run: |
          python - << 'EOF'
          # (中略: 長いPythonコードはそのまま)
          EOF

      # お天気コードと同じ実績のある延命処理を実装！
      - name: Keepalive (Prevent 60 days suspend)
        if: github.event_name == 'schedule' && github.event.cron == '17 0-6 * * 1-5'
        run: |
          if [ "$(date +%u)" -eq 1 ]; then
            git config --global user.name "github-actions[bot]"
            git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "keepalive: prevent stock workflow suspension"
            git push origin HEAD:${{ github.ref_name }}
          fi
