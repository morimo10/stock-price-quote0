name: Fetch Stock Prices and Send to Dot. Device

on:
  schedule:
    # 毎日 UTC 00:00 から 07:00 まで平日のみ毎時0分と30分に実行 (日本時間 09:00 〜 16:00)
     - cron: '0,30 0-7 * * 1-5'

    # 1月1日という将来にして、デバイスを入手するまで実行しないようにしています。
#      - cron: '0 0 1 1 *'
  
  workflow_dispatch: # 手動実行用ボタン

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance requests pytz

    - name: Run script
      env:
        DOT_API_KEY: ${{ secrets.DOT_API_KEY }}
        DOT_DEVICE_ID: ${{ secrets.DOT_DEVICE_ID }}
      run: python fetch_and_send.py
