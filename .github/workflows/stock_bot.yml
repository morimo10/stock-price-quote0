name: Send Stock Price to Dot Device

on:
  schedule:
    # 平日の日本時間 09:00〜15:59 の間、15分おきに実行（お天気の仕組みを踏襲）
    - cron: '*/15 0-6 * * 1-5'
  workflow_dispatch: # 手動実行ボタン

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytz yfinance

      - name: Run Stock Script
        # 💡 お天気スクリプトと完全に同じSecrets名・環境変数名に統一しました
        env:
          QUOTE0_API_KEY: ${{ secrets.QUOTE0_API_KEY }}
          QUOTE0_DEVICE_ID: ${{ secrets.QUOTE0_DEVICE_ID }}
        run: |
          python fetch_and_send.py
